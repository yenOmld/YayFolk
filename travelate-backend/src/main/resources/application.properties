# 服务器配置
server.port=8080

# 禁用 JMX 远程监控，避免内网穿透时的安全限制错误
spring.jmx.enabled=false

# 数据库配置（请根据实际情况修改）
spring.datasource.url=jdbc:mysql://localhost:3306/travelate?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=YOUR_DATABASE_PASSWORD

# JPA 配置
spring.jpa.database=MYSQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 日志配置
logging.level.com.travelate.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
