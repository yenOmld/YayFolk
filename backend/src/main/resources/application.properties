# 鏈嶅姟鍣ㄩ厤缃?
server.port=8080

# 绂佺敤 JMX 杩滅▼鐩戞帶锛岄伩鍏嶅唴缃戠┛閫忔椂鐨勫畨鍏ㄩ檺鍒堕敊璇?
spring.jmx.enabled=false

# 鏁版嵁搴撻厤缃紙璇锋牴鎹疄闄呮儏鍐典慨鏀癸級
spring.datasource.url=jdbc:mysql://localhost:3306/yayfolk?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&allowMultiQueries=true
spring.datasource.username=root
spring.datasource.password=123456

# JPA 閰嶇疆
spring.jpa.database=MYSQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 鏃ュ織閰嶇疆
logging.level.com.yayfolk.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Local image classifier
image.classifier.service-url=http://127.0.0.1:5001
image.classifier.topk=3
image.classifier.auto-tag-confidence-threshold=0.60
